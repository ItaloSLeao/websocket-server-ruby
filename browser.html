<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Server Demo</title>
  <style>
    body { font-family: monospace; background: #121212; color: #eee; margin: 2rem auto; max-width: 500px; }
    button, input { font-family: inherit; background: #222; color: #fff; border: 1px solid #444; padding: 0.5rem; }
    button { cursor: pointer; }
    button:hover:not(:disabled) { background: #333; }
    button:disabled, input:disabled { opacity: 0.5; }
    #log { background: #1a1a1a; border: 1px solid #333; height: 250px; overflow-y: auto; padding: 1rem; margin: 1rem 0; }
    .flex { display: flex; gap: 0.5rem; }
    .flex input { flex: 1; }
    .sys { color: #888; }
    .sent { color: #4fc3f7; }
    .recv { color: #00ff88; }
    .err { color: #ff6b35; }
  </style>
</head>
<body>
  <h1>WS://RUBY Client</h1>
  <div>Status: <span id="status">disconnected</span></div>
  <button id="btn" onclick="toggle()">connect()</button>

  <div id="log"><div class="sys">// start server.rb then press connect</div></div>

  <div class="flex">
    <input id="input" placeholder="type a message..." disabled onkeydown="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()" disabled>send()</button>
  </div>

  <script>
    let ws = null, connected = false;
    const el = id => document.getElementById(id);

    function log(msg, type = 'sys') {
      const l = el('log');
      l.innerHTML += `<div class="${type}">${msg}</div>`;
      l.scrollTop = l.scrollHeight;
    }

    function toggle() {
      if (connected) return ws.close();
      el('btn').textContent = 'connecting...';
      el('btn').disabled = true;
      log('opening TCP connection to ws://localhost:2345 ...', 'sys');

      ws = new WebSocket('ws://localhost:2345');
      ws.onopen = () => {
        connected = true; el('status').textContent = 'connected';
        el('btn').textContent = 'disconnect()'; el('btn').disabled = false;
        el('input').disabled = el('sendBtn').disabled = false;
        log('connected — WebSocket active', 'recv');
        ws.send('Can you hear me?'); log('→ sent: "Can you hear me?"', 'sent');
      };
      ws.onmessage = e => log(`← recv: "${e.data}"`, 'recv');
      ws.onerror = () => {
        connected = false; el('status').textContent = 'error';
        log('connection error — is server.rb running?', 'err');
        el('btn').textContent = 'connect()'; el('btn').disabled = false;
      };
      ws.onclose = () => {
        connected = false; el('status').textContent = 'disconnected';
        el('btn').textContent = 'connect()'; el('btn').disabled = false;
        el('input').disabled = el('sendBtn').disabled = true;
        log('connection closed', 'sys');
      };
    }

    function send() {
      const i = el('input'), msg = i.value.trim();
      if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(msg); log(`→ sent: "${msg}"`, 'sent'); i.value = '';
    }
  </script>
</body>
</html>
